include:
  physics: config/teukolsky_radial.yaml

parameter_space:
  a:
    center: 0.5
    range: 0.499
  omega:
    center: 5.00005
    range: 4.99995
  domain:
    k_horizon_margin: 1.0e-2
    resample_factor: 4
    max_attempts: 32

initialization:
  enabled: true
  checkpoint: outputs/pinn/final_model_full_a_omega.pt
  load_optimizer: false
  strict: true
# param_sampling:
#   a_center: 0.125
#   a_range: 0.075
#   omega_center: 0.55
#   omega_range: 0.45
model:
  hidden_dims: [128, 128, 128, 128]
  activation: silu
  fourier_num_freqs: 2
  fourier_scale: 1.0
  param_embed_dim: 64
  use_film: true
  use_residual: true

  a_min_local: 0.001
  a_max_local: 0.999
  omega_min_local: 0.0001
  omega_max_local: 10.0

sampling:
  parameter_batch:
    mode: fixed_pool
    sampler: sobol
    batch_size: 4
    n_param_samples: 32 

  collocation:
    interior:
      strategy: chebyshev
      n_points: 64

    boundary:
      strategy: none
      n_points: 0

    adaptive:
      enabled: true
      candidate_method: sobol
      n_candidates: 512
      refresh_freq: 50
      adaptive_frac: 0.7
      normalize_residual: false

  anchors:
    mode: chebyshev_plus_adaptive
    n_base: 20
    n_adaptive: 5
    n_random: 0

training:
  optimizer:
    lr: 1.0e-3

  anchor:
    freq: 1
    start_step: 1
    n_anchors: 20

  scheduler:
    enabled: true
    type: exp_after_warmup
    warmup_steps: 3000
    decay_start: 500
    decay_rate: 0.9999
    min_lr: 1.0e-4

  loss:
    weight_interior: 1.0
    weight_boundary: 0.0
    weight_anchor: 1.0e+2

  loss_balance:
    mode: fixed
    eps: 1.0e-12

  validation:
    mode: fixed_pool
    val_freq: 50
    val_n_points: 200
    n_param_samples: 16
    param_sampler: sobol
    monitor: mean
    track_worst: true
    sobol_seed: 4321
    sobol_skip: 0
    save_best_freq: 50

  early_stop:
    patience: 500
    threshold: 1.0e-6

  weight_schedule:
    anchor:
      enabled: true
      steps: 50000
      decay_enabled: true
      warmup_steps: 0
      decay_start: 500
      decay_rate: 0.99999
      min_weight: 1.0e-3

    interior:
      enabled: true
      steps: 50000
      growth_enabled: true
      warmup_steps: 0
      growth_start: 500
      growth_rate: 1.00001
      max_weight: 1.0

  epochs: 50000

curriculum:
  parameter:
    enabled: false
    stages:
      - epochs: 2000
        a_range: 0.0
        omega_range: 0.0
        weight_anchor: 0.0
      - epochs: 4000
        a_range: 0.005
        omega_range: 0.005
        weight_anchor: 0.2
      - epochs: 14000
        a_range: 0.01
        omega_range: 0.01
        weight_anchor: 0.5

  collocation:
    enabled: false
    stages:
      - epochs: 1000
        interior_strategy: article_uniform
        n_interior: 32
      - epochs: 3000
        interior_strategy: chebyshev
        n_interior: 64
      - epochs: 999999
        interior_strategy: rard
        n_interior: 64

regularization:
  anti_trivial:
    enabled: false
    seed_steps: 3000
    seed_every: 5
    n_seed: 16
    seed_strategy: chebyshev
    weight_seed: 0.2
    relative: false

  dynamic_balance:
    enabled: false
    every_steps: 20
    w_anchor_min: 1.0e-5
    w_anchor_max: 10.0

  flat_variance:
    enabled: false
    target: Rprime
    kappa: 1.0
    eps: 1.0e-12
    weight: 1.0
    decay_enabled: true
    warmup_steps: 3000
    decay_start: 500
    decay_rate: 0.9999
    min_weight: 1.0e-3
    steps: 50000
    use_dedicated_points: true
    strategy: chebyshev
    n_points: 64
    
  head_reg:
    enabled: true
    weight_nl: 1.0e-6
    weight_resp: 1.0e-8

  param_curvature:
    enabled: true
    weight: 1.0e-4
    delta_alpha: 0.05
    delta_xi: 0.05
    n_probe_points: 32

restart:
  enabled: false
  stall_window: 300
  stall_tol: 1.0e-4
  lr_decay_on_restart: 0.5

visualization:
  viz_show_enabled: true
  viz_enabled: true
  viz_every_steps: 100
  viz_auto_close_sec: 3.0
  viz_num_points: 500
  viz_r_min: 2.0
  viz_r_max: 1000.0
  viz_save_enabled: true
  viz_subdir: "viz_compare"

runtime:
  dtype: float64

mathematica:
  kernel_path: "/mnt/f/mma/WolframKernel.exe"
  wl_path_win: "F:/EMRI/Radial_flow/Radial_Function.wl"

atlas_training:
  steps: 10000
  batch_size: 8
  n_interior: 64
  grad_clip: 1.0
  normalize_residual: false

  val_fraction: 0.2
  val_param_samples: 12
  val_every: 50
  val_n_points: 64

  early_stopping:
    enabled: true
    patience: 20
    min_rel_improve: 1.0e-4
    min_steps: 2000

  save_every: 200
  ckpt_every: 200
  viz_every: 200
  viz_num_points: 400
  viz_r_min: 2.0
  viz_r_max: 1000.0
  anchor_backend: pybhpt
  viz_benchmark_backend: pybhpt
  viz_pybhpt_timeout: 10.0
  anchor_pybhpt_timeout: 10.0
  viz_mma_enabled: false

  anchor_target_ratio: 1.0e-2
  train_seed: 1234
  output_root: outputs/atlas_patch_train
  anchor_fail_log_name: anchor_failures.jsonl

multipatch_training:
  enabled: true

  # patch 训练顺序:
  #   center_out      -> 从图册中心往外
  #   pool_desc       -> patch 覆盖点多的先训
  #   patch_id        -> 按 patch_id 顺序
  patch_order: center_out

  # 是否允许用相邻 patch 的 best checkpoint 做 warm start
  warmstart_from_neighbor: true

  # 若为 true，则已有 best 模型的 patch 会跳过
  skip_existing: true

  # 若为 true，则会从 patch_runs 中的 latest_model.pt 续跑
  resume_partial_runs: true

  # 若为 true，则会加载已有 registry 并复用其中的 patch_records
  reuse_existing_registry: true

  # 单 patch 覆盖 atlas_training.steps；若为 null 则用 atlas_training.steps
  patch_steps: null

  # 输出总目录
  output_root: outputs/atlas_multipatch_train_coarse040_retrain_rel1e4

  # registry 文件名
  registry_name: atlas_registry_coarse040_retrain_rel1e4.json

  # 训练完成后，是否把 best/latest checkpoint 复制到统一模型目录
  export_flat_models: true

  # 统一模型导出目录
  export_model_dirname: models

  # 可选：限制只训练前 N 个 patch，调试时很有用；完整跑时设为 null
  max_patches: null
